apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: pacman
  labels:
    app.kubernetes.io/name: mongo
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: pacman-on-eks-auto-mode
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: mongo
    app.kubernetes.io/component: database
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
      protocol: TCP
